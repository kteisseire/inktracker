# Nginx config INSIDE the client container.
# Serves the built SPA and falls back to index.html for client-side routing.
# (The PUBLIC-facing reverse proxy / TLS lives in the host nginx — see deploy/nginx.conf)
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # PWA service worker and manifest must never be cached aggressively
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
    }

    # Hashed assets can be cached forever
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
