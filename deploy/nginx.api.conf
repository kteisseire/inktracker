# HOST nginx config for the API-only VPS (front stays on Vercel).
# Lives on the VPS at /etc/nginx/sites-available/glimmerlog-api.
# Terminates HTTPS for api.glimmerlog.com and routes everything to the
# Express server container (127.0.0.1:3001).
#
# CORS is handled by the Express server (cors({ origin: CLIENT_URL })),
# NOT here — do not add Access-Control-* headers in nginx or they double up.
#
# TLS certs are added automatically by certbot. Before running certbot, only
# the port 80 server block is needed; certbot injects the 443 block.

server {
    listen 80;
    server_name api.glimmerlog.com;

    # Allow base64 photo uploads (server limit is 5MB)
    client_max_body_size 6m;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
