# HOST nginx config (lives on the VPS at /etc/nginx/sites-available/glimmerlog).
# Terminates HTTPS and routes:
#   /api/v1  -> Express server container (127.0.0.1:3001)
#   /        -> static SPA container     (127.0.0.1:8080)
# Same-origin = no CORS issues, and Google/Discord OAuth popups work cleanly.
#
# TLS certs are added automatically by certbot (see DEPLOY.md). Before running
# certbot, only the port 80 server block is needed; certbot injects the 443 block.

server {
    listen 80;
    server_name glimmerlog.com www.glimmerlog.com;

    # Increased to allow base64 photo uploads (server limit is 5MB)
    client_max_body_size 6m;

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://127.0.0.1:3001;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
