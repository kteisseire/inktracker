# GlimmerLog — API + DB on the VPS, front stays on Vercel.
# Public TLS / domain routing handled by the HOST nginx (deploy/nginx.api.conf),
# which proxies api.glimmerlog.com to the server container exposed on 127.0.0.1 below.
#
# Use:  docker compose -f docker-compose.api.yml up -d --build

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Only reachable from other containers, never exposed publicly
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      # CLIENT_URL is the Vercel front origin — used for CORS allow-origin and
      # as the OAuth redirect base. Must match the public front domain exactly.
      CLIENT_URL: ${CLIENT_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_REDIRECT_URI: ${DISCORD_REDIRECT_URI}
      RESEND_API_KEY: ${RESEND_API_KEY}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
      PORT: "3001"
    # Bind to localhost only — host nginx proxies api.glimmerlog.com here
    ports:
      - "127.0.0.1:3001:3001"

volumes:
  pgdata:
