# GlimmerLog — self-hosted stack (Postgres + Express API + static client)
# Public TLS / domain routing is handled by the HOST nginx (deploy/nginx.conf),
# which proxies to the containers exposed on 127.0.0.1 below.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Only reachable from other containers, never exposed publicly
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_URL: ${CLIENT_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_REDIRECT_URI: ${DISCORD_REDIRECT_URI}
      RESEND_API_KEY: ${RESEND_API_KEY}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
      PORT: "3001"
    # Bind to localhost only — host nginx proxies /api here
    ports:
      - "127.0.0.1:3001:3001"

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        # Same-origin: client calls /api/v1, host nginx routes it to the server
        VITE_API_URL: ${VITE_API_URL}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
        VITE_DISCORD_CLIENT_ID: ${VITE_DISCORD_CLIENT_ID}
    restart: unless-stopped
    # Static SPA served on localhost:8080, host nginx serves it publicly
    ports:
      - "127.0.0.1:8080:80"

volumes:
  pgdata:
