<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="glimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="40%" stop-color="#f5c542"/>
      <stop offset="100%" stop-color="#fcd879"/>
    </linearGradient>
    <linearGradient id="glimmerSoft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fefce8"/>
      <stop offset="100%" stop-color="#fcd879" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#0c0a14" stroke="url(#glimmer)" stroke-width="3"/>

  <!-- Subtle inner ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.15"/>

  <!-- Ambient glow behind star -->
  <circle cx="256" cy="256" r="100" fill="url(#core)" opacity="0.3"/>

  <!-- Main 4-point Glimmer star -->
  <path d="M256 56 L288 200 L432 256 L288 312 L256 456 L224 312 L80 256 L224 200 Z"
        fill="url(#glimmer)" filter="url(#glow)"/>

  <!-- Inner star highlight -->
  <path d="M256 120 L274 216 L370 256 L274 296 L256 392 L238 296 L142 256 L238 216 Z"
        fill="url(#glimmerSoft)" opacity="0.3"/>

  <!-- Bright core -->
  <circle cx="256" cy="256" r="32" fill="#fefce8" opacity="0.85" filter="url(#softGlow)"/>
  <circle cx="256" cy="256" r="16" fill="white" opacity="0.6"/>

  <!-- Diagonal sparkle lines (quill inspiration) -->
  <line x1="256" y1="32" x2="256" y2="72" stroke="#fcd879" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
  <line x1="256" y1="440" x2="256" y2="480" stroke="#fcd879" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
  <line x1="32" y1="256" x2="72" y2="256" stroke="#a78bfa" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
  <line x1="440" y1="256" x2="480" y2="256" stroke="#a78bfa" stroke-width="3" opacity="0.5" stroke-linecap="round"/>

  <!-- Small sparkle dots around -->
  <circle cx="180" cy="150" r="4" fill="#c4b5fd" opacity="0.6"/>
  <circle cx="340" cy="170" r="3" fill="#fcd879" opacity="0.5"/>
  <circle cx="160" cy="350" r="3.5" fill="#fcd879" opacity="0.4"/>
  <circle cx="350" cy="340" r="3" fill="#c4b5fd" opacity="0.5"/>
  <circle cx="320" cy="130" r="2" fill="#fefce8" opacity="0.7"/>
  <circle cx="190" cy="380" r="2.5" fill="#fefce8" opacity="0.5"/>
</svg>
